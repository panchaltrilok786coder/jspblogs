<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Login or sign up to MyBlog Pro.">
  <meta name="keywords" content="login, signup, authentication">
  <meta name="author" content="MyBlog Pro">

  <title>Auth | MyBlog Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">MyBlog Pro</div>
</header>

<main class="auth-container">

  <!-- LOGIN -->
  <section class="auth-box" id="loginBox">

    <h2>Login</h2>

    <input class="input-field" id="loginUser" placeholder="Email" required>
    <input class="input-field" id="loginPass" placeholder="Password" required>

    <button class="btn-primary" id="loginBtn">Login</button>

    <p class="auth-switch" id="goSignup">
      Don't have an account? Sign Up
    </p>

  </section>

  <!-- SIGNUP -->
  <section class="auth-box hidden" id="signupBox">

    <h2>Sign Up</h2>

    <input class="input-field" id="signupName" placeholder="Full Name">
    <input class="input-field" id="signupEmail" placeholder="Email" required>
    <input class="input-field" id="signupPass" placeholder="Password" required>

    <button class="btn-primary" id="signupBtn">Create Account</button>

    <p class="auth-switch" id="goLogin">
      Already have an account? Login
    </p>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

<div id="g_id_onload"
     data-client_id="YOUR_GOOGLE_CLIENT_ID"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin" data-type="standard"></div>
  </section>

</main>

<footer class="footer">
  © 2026 MyBlog Pro — Secure Auth System
</footer>
<script src="./auth.js" type="module" defer></script>
</body>
</html>
